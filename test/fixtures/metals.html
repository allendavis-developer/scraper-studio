<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scrap metal prices</title>
    <style>
      body { font: 15px/1.5 system-ui, sans-serif; margin: 24px; }
      h3 { background: #111; color: #fff; padding: 6px 10px; margin: 18px 0 0; }
      table { border-collapse: collapse; width: 100%; max-width: 700px; }
      td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    </style>
  </head>
  <body>
    <!-- Differently-shaped blocks, like the real scrap page: Gold has many rows,
         Silver has one, each with its own unit. We normalize them into one
         metal | unit | price table by PLACING each value at a row × column. -->
    <h3 class="gold-h">Gold</h3>
    <table class="gold"><tbody>
      <tr><td class="name">9ct HM</td><td class="unit">Per GM</td><td class="price">£35.15</td></tr>
      <tr><td class="name">14ct HM</td><td class="unit">Per GM</td><td class="price">£54.85</td></tr>
      <tr><td class="name">24ct HM</td><td class="unit">Per GM</td><td class="price">£93.77</td></tr>
    </tbody></table>

    <h3 class="silver-h">Silver</h3>
    <table class="silver"><tbody>
      <tr><td class="name">HM</td><td class="unit">Per KG</td><td class="price">£1156.19</td></tr>
    </tbody></table>

    <h3 class="plat-h">Platinum</h3>
    <table class="platinum"><tbody>
      <tr><td class="name">HM Pt</td><td class="unit">Per GM</td><td class="price">£33.81</td></tr>
    </tbody></table>
  </body>
</html>
