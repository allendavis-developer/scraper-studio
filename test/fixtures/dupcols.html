<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Duplicate header table</title>
    <style>
      body { font: 15px/1.5 system-ui, sans-serif; margin: 24px; }
      table { border-collapse: collapse; }
      th, td { padding: 6px 12px; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <h3>Sales by user</h3>
    <!-- A real report shape: a "Sales" block and a "Refunds" block, so Qty,
         Margin Value and Margin Percentage each appear TWICE in the header. The
         reader must give every column a UNIQUE name AND label so no column's
         data is lost when rows are built (o[name]=…) or spread into columns. -->
    <table class="table table-hover">
      <thead>
        <tr>
          <th>User Name</th>
          <th>Qty</th><th>Sales</th><th>Margin Value</th><th>Margin Percentage</th>
          <th>Qty</th><th>Refunds</th><th>Margin Value</th><th>Margin Percentage</th>
          <th>Easy Pay</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Linds</td><td>43</td><td>£5,030.29</td><td>£1,939.07</td><td>41.773</td><td>0</td><td>£0</td><td>£0</td><td>0</td><td>£550</td></tr>
        <tr><td>Joey</td><td>86</td><td>£7,888.15</td><td>£2,701.41</td><td>36.785</td><td>3</td><td>£0</td><td>£0</td><td>0</td><td>£1,470</td></tr>
        <tr><td>Ruby</td><td>76</td><td>£4,217.96</td><td>£1,690.43</td><td>43.579</td><td>1</td><td>£0</td><td>£0</td><td>0</td><td>£960</td></tr>
      </tbody>
    </table>
  </body>
</html>
